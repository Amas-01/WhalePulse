<?xml version="1.0" encoding="UTF-8"?>
<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="WhalePulse icon">
  <defs>
    <linearGradient id="g1" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="100%" stop-color="#00b4a0" />
    </linearGradient>
    <filter id="dropGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00e5ff" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- Floating whale silhouette where mid-body becomes a pulse waveform -->
  <g filter="url(#dropGlow)">
    <path d="M4 28c4-6 10-10 16-10 2.5 0 4.5.7 6 1.6 1.3.8 2.6 1.6 4.2 1.6 1.6 0 3.2-1 4.8-2.2 1.6-1.2 3.8-2.8 6.5-2.8 0 0-2.2 4-4.6 5.3-2.4 1.2-4.8 1.5-7.2 1.5-1.6 0-3.2.6-4.8 1.2-1.6.6-3.2 1.4-4.8 1.4-3 0-6-1.8-9-4.4z" fill="url(#g1)"/>

    <!-- Pulse peaks integrated into the whale body (readable at small sizes) -->
    <path d="M12 24 L16 24 L17.8 20 L20 28 L22.4 22 L24 24 L28 24" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

    <!-- Tail fluke suggestion -->
    <path d="M40 22 L44 18 L42 26 L44 30 L40 26" fill="url(#g1)" opacity="0.98"/>
  </g>
</svg>
